<!-- Controle de Volume Geral -->
<div class="mb-6 p-4 bg-gray-100 rounded-lg">
  <div class="flex items-center justify-between mb-3">
    <label class="text-lg font-semibold text-gray-700">Volume Geral</label>
    <span class="text-sm text-gray-600"
      >{{ (masterVolume() * 100).toFixed(0) }}%</span
    >
  </div>
  <div class="flex items-center gap-3">
    <span class="text-sm text-gray-500">🔇</span>
    <input
      type="range"
      min="0"
      max="1"
      step="0.01"
      [value]="masterVolume()"
      (input)="onVolumeChange($event)"
      class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider"
    />
    <span class="text-sm text-gray-500">🔊</span>
  </div>
</div>

<div class="flex justify-between mb-6">
  <button (click)="playAll()" z-button zType="default" class="w-full mr-5">
    Tocar
  </button>
  <button (click)="stopAll()" z-button zType="destructive" class="w-full">
    Parar
  </button>
</div>

<div class="grid gap-5">
  <div
    *ngFor="let audio of sounds; let i = index"
    class="grid grid-cols-[1fr] gap-5"
  >
    <label
      class="cursor-pointer flex border-2 border-solid border-blue-600 bg-blue-200 rounded p-4 select-none"
      style="justify-content: flex-start"
    >
      <input
        type="checkbox"
        [checked]="!audioService.isMuted[i]"
        (change)="toggleMute(audio.id)"
        class="h-20 w-20 mr-5 text-green-600 border-2 border-gray-300 rounded-sm transition duration-200 ease-in-out focus:ring-2 focus:ring-green-500"
      />
      <span class="text-lg font-medium text-gray-700">
        {{ audio.id }}
      </span>
    </label>
  </div>

  <button (click)="muteAll()" z-button zType="outline" class="w-full mr-5">
    Desmarcar todos
  </button>

  <button (click)="unmuteAll()" z-button zType="outline" class="w-full mr-5">
    Marcar todos
  </button>
</div>
