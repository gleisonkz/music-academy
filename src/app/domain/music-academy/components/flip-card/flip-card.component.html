<div class="card-container" [class.flipped]="isFlipped()" (click)="flipCard()">
  <div class="card">
    <div class="card-front">
      <z-card [zTitle]="'Pergunta'">
        <p>{{ question() }}</p>
      </z-card>
    </div>
    <div class="card-back">
      <z-card [zTitle]="'Resposta'">
        <p>{{ answer() }}</p>
      </z-card>
    </div>
  </div>
</div>
