<div
  class="dropzone"
  [class.dragging]="isDragging()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  <input
    type="file"
    [accept]="accept()"
    class="dropzone-input"
    (change)="onFileSelect($event)"
  />
  <span class="dropzone-icon material-icons">upload_file</span>
  <p class="dropzone-text">{{ title() }}</p>
  <p class="dropzone-hint">{{ hint() }}</p>
  @if (selectedFileName()) {
  <p class="dropzone-file">{{ selectedFileName() }}</p>
  }
</div>
